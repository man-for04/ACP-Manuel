//PROTOCOL BUFFER -> DEFINISCE IDL (generazione automatica stub) + FORMATO INTERSCAMBIO MESSAGGI

syntax = "proto3";
package helloworld; 
//tutte le interazioni sono in questo spazio dei nomi

//c'è semplicemente servizio say hello che prende una stringa e ritorna una stringa

//specifica IDL del mio servizio HELLOWORLD
service Greeter { //qui ho lista di chiamate RPC
    
    rpc SayHello(HelloRequest) returns (HelloReply); //consiglio: usa messaggi che siano semanticamente espliciti
                                                    // per gli stream-> parametro e return sono dal POV del client
}

message HelloRequest{
    
    string name = 1;
}

message HelloReply{
    
    string message = 1;
}

